<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motoristas - Controle de Veículos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topo">
    <div class="header-content">
      <div class="header-left">
        <img src="img/logo.png" alt="Logo da empresa" class="logo">

        <div class="header-texto">
          <h1>Controle de Veículos</h1>
        </div>
      </div>

      <div class="menu">
        <a href="index.html">Painel</a>
        <a href="veiculos.html">Veículos</a>
        <a href="motoristas.html">Motoristas</a>
        <a href="historico.html">Histórico</a>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <h2>Cadastro de Motoristas</h2>
      <p>Cadastre e mantenha atualizados os motoristas autorizados.</p>
    </div>

    <section class="form-box">
      <h2>Cadastrar / Editar Motorista</h2>
      <form id="formMotorista">
        <input type="hidden" id="motoristaId">
        <input type="text" id="nome" placeholder="Nome" required>
        <input type="text" id="matricula" placeholder="Matrícula" required>
        <input type="text" id="setor" placeholder="Setor" required>
        <button type="submit">Salvar Motorista</button>
      </form>
    </section>

    <section class="list-box">
      <h2>Motoristas Cadastrados</h2>
      <div id="listaMotoristas"></div>
    </section>
  </main>

  <script src="motoristas.js"></script>
  <script src="menu.js"></script>
</body>
</html>
