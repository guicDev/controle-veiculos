<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veículos - Controle de Veículos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topo">
    <div class="header-content">
      <div class="header-left">
        <img src="img/logo.png" alt="Logo Dara" class="logo">

        <div class="header-texto">
          <h1>Controle de Veículos</h1>
          <p>Dara Produções e Eventos</p>
        </div>
      </div>

      <div class="menu">
        <a href="index.html">Painel</a>
        <a href="veiculos.html">Veículos</a>
        <a href="motoristas.html">Motoristas</a>
        <a href="historico.html">Histórico</a>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <h2>Cadastro de Veículos</h2>
      <p>Cadastre, edite e consulte os veículos disponíveis no sistema.</p>
    </div>

    <section class="form-box">
      <h2>Cadastrar / Editar Veículo</h2>
      <form id="formVeiculo">
        <input type="hidden" id="veiculoId">
        <input type="text" id="nome" placeholder="Nome / Modelo" required>
        <input type="text" id="placa" placeholder="Placa" required>
        <input type="text" id="tipo" placeholder="Tipo" required>
        <input type="text" id="foto" placeholder="URL da foto (opcional)">
        <button type="submit">Salvar Veículo</button>
      </form>
    </section>

    <section class="list-box">
      <h2>Veículos Cadastrados</h2>
      <div id="listaVeiculos"></div>
    </section>
  </main>

  <script src="veiculos.js"></script>
  <script src="menu.js"></script>
</body>
</html>
